repos:
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args:
          - --baseline
          - .secrets.baseline
        exclude: ^(?:pnpm-lock\.yaml|uv\.lock)$

  - repo: local
    hooks:
      - id: eslint
        name: ESLint
        entry: pnpm run lint
        language: system
        pass_filenames: false

      - id: typescript-check
        name: TypeScript check
        entry: pnpm run check:pre-commit
        language: system
        pass_filenames: false
